name: Daily Auto Blog Post

on:
  schedule:
    # 매일 오전 7시(KST) = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Blog Post
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://happyyein.pages.dev/api/auto-blog/generate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AUTO_BLOG_SECRET }}")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Blog post generation failed!"
            exit 1
          fi
          
          echo "✅ Blog post generated successfully!"
